<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Image Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="toolbar">
       <button id="save-btn" style="background: #28a745; color: white;">Save PDF</button>
    
        <button id="delete-btn-mobile" 
            onclick="if(selectedElement) deleteImage(selectedElement)" 
            style="background: #e74c3c; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">🗑 ลบรูปที่เลือก
        </button>
    </div>

    <div id="editor-container">
        <div id="pdf-wrapper">
            <canvas id="pdf-canvas"></canvas>
            </div>
    </div>

    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
